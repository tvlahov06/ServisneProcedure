<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Servisne Procedure">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0072c1">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <title>Servisne Procedure - Pretraga Brandova</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0072c1 0%, #014fa2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 0px;
        }

        #searchInput {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.3em;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .brand-name {
            font-size: 1.8em;
            color: #0B2D72;
            margin-bottom: 20px;
            font-weight: 650;
            border-bottom: 3px solid #0B2D72;
            padding-bottom: 10px;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 7px;
            padding: 7px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            font-weight: 650;
            color: #555;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            color: #333;
            flex: 1;
            line-height: 1.1;
            word-break: break-word;
        }

        .download-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            font-weight: 500;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .download-btn:hover {
            background: #5568d3;
        }

        .web-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .web-link:hover {
            text-decoration: underline;
        }

        .email-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .no-results {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            color: #666;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .no-results h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .icon {
            margin-right: 5px;
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px 20px;
            margin-top: 60px;
            font-size: 0.9em;
            opacity: 0.01;
        }

        footer p {
            margin: 0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-label {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Servisne Procedure</h1>
            <p>Pretražite servisne informacije po brandu</p>
        </header>

        <div class="search-box">
            <div class="search-input-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Upišite naziv branda (npr. Samsung, Bosch, LG...)"
                    autocomplete="off"
                >
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div id="results" class="results"></div>
    </div>

    <footer>
        <p>Created by Tomislav Vlahović</p>
    </footer>

    <script src="script.js"></script>

    <div id="emailWidget">
        <button id="emailBtn" onclick="toggleEmailForm()">
            ✉️ Pošalji poruku
        </button>
        
        <div id="emailFormContainer" style="display: none;">
            <div class="email-form-box">
                <div class="email-form-header">
                    <h3>✉️ Pošalji nam poruku</h3>
                    <button class="close-btn" onclick="toggleEmailForm()">✕</button>
                </div>
                
                <div id="formContent">
                    <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                        <!-- OVDJE STAVI SVOJ WEB3FORMS ACCESS KEY -->
                        <input type="hidden" name="access_key" value="362495a7-8e2e-4ca7-9362-667d65a479ca">
                        <input type="hidden" name="subject" value="Nova poruka sa Servisne Procedure">
                        <input type="hidden" name="from_name" value="Servisne Procedure">
                        <input type="hidden" name="email" value="internal@servisne-procedure.local">
                        
                        <div class="form-group">
                            <label>Tvoje ime</label>
                            <input type="text" name="name" placeholder="npr. Marko">
                        </div>
                        
                        <div class="form-group">
                            <label>Naslov</label>
                            <input type="text" name="custom_subject" placeholder="npr. Ubaciti Philips">
                        </div>
                        
                        <div class="form-group">
                            <label>Poruka *</label>
                            <textarea name="message" placeholder="Napiši svoju poruku ovdje..." rows="6" required></textarea>
                        </div>
                        
                        <button type="submit" id="submitBtn">
                            <span id="btnText">📤 Pošalji poruku</span>
                            <span id="btnLoader" style="display: none;">⏳ Šaljem...</span>
                        </button>
                    </form>
                </div>
                
                <div id="successMessage" style="display: none;">
                    <div class="success-content">
                        <div class="success-icon">✅</div>
                        <h3>Poruka poslana!</h3>
                        <button onclick="resetForm()" class="new-message-btn">
                            ✉️ Pošalji novu poruku
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* EMAIL WIDGET STYLES */
        #emailWidget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }

        #emailBtn {
            background: linear-gradient(135deg, #0072c1 0%, #014fa2 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 193, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #emailBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 114, 193, 0.5);
        }

        #emailBtn:active {
            transform: translateY(-1px);
        }

        #emailFormContainer {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            max-width: calc(100vw - 60px);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .email-form-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .email-form-header {
            background: linear-gradient(135deg, #0072c1 0%, #014fa2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .email-form-header h3 {
            margin: 0;
            font-size: 1.3em;
            font-weight: 600;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        #formContent {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0072c1;
            box-shadow: 0 0 0 3px rgba(0, 114, 193, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        #submitBtn {
            width: 100%;
            background: linear-gradient(135deg, #0072c1 0%, #014fa2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        #submitBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 114, 193, 0.4);
        }

        #submitBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* SUCCESS MESSAGE */
        #successMessage {
            padding: 50px 24px;
            text-align: center;
        }

        .success-content {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .success-content h3 {
            color: #0072c1;
            margin: 0 0 24px 0;
            font-size: 1.5em;
        }

        .new-message-btn {
            background: #f0f0f0;
            color: #0072c1;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-message-btn:hover {
            background: #e0e0e0;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            #emailWidget {
                bottom: 20px;
                right: 20px;
            }

            #emailBtn {
                padding: 14px 20px;
                font-size: 14px;
            }

            #emailFormContainer {
                bottom: 80px;
                right: 20px;
                left: 20px;
                width: auto;
            }

            .email-form-header h3 {
                font-size: 1.1em;
            }

            #formContent {
                padding: 20px;
            }
        }
    </style>

    <script>
        // Toggle email form
        function toggleEmailForm() {
            const formContainer = document.getElementById('emailFormContainer');
            const btn = document.getElementById('emailBtn');
            
            if (formContainer.style.display === 'none') {
                formContainer.style.display = 'block';
                btn.style.display = 'none';
            } else {
                formContainer.style.display = 'none';
                btn.style.display = 'flex';
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('formContent').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('contactForm').reset();
        }

        // Form submission
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('contactForm');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                const btnText = document.getElementById('btnText');
                const btnLoader = document.getElementById('btnLoader');
                
                // Disable button and show loader
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnLoader.style.display = 'inline';
                
                try {
                    const formData = new FormData(form);
                    const response = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Show success message
                        document.getElementById('formContent').style.display = 'none';
                        document.getElementById('successMessage').style.display = 'block';
                    } else {
                        throw new Error('Submission failed');
                    }
                } catch (error) {
                    alert('Greška pri slanju poruke. Molimo pokušajte ponovno.');
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            });
        });
    </script>
    <!-- EMAIL WIDGET END -->

</body>
</html>
